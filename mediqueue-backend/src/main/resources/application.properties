spring.application.name=mediqueue
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mediqueue?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root@123}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
app.jwt.secret=${APP_JWT_SECRET:dev-secret-key-for-miniproject-minimum-32-chars}
server.port=8080
