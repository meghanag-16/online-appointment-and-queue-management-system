name: MediQueue CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
# ─────────────────────────────────────────────
#  BACKEND — build + test (JUnit + Mockito)
# ─────────────────────────────────────────────
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: mediqueue
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Import schema
        run: mysql -h 127.0.0.1 -uroot -proot mediqueue < schema.sql

      - name: Run Backend Tests (JUnit + Mockito)
        working-directory: mediqueue-backend
        run: mvn clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/mediqueue?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          SPRING_JPA_HIBERNATE_DDL_AUTO: validate
          APP_JWT_SECRET: dev-secret-key


# ─────────────────────────────────────────────
#  FRONTEND — Jest testing + build
# ─────────────────────────────────────────────
  frontend:
    name: Frontend — Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mediqueue-frontend/package-lock.json

      - name: Install dependencies
        working-directory: mediqueue-frontend
        run: npm ci

      - name: Run Jest Tests
        working-directory: mediqueue-frontend
        run: npm run test

      - name: Build
        working-directory: mediqueue-frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: /api/v1


# ─────────────────────────────────────────────
#  E2E TESTING — Cypress
# ─────────────────────────────────────────────
  e2e:
    name: End-to-End Tests (Cypress)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Start Backend
        working-directory: mediqueue-backend
        run: mvn spring-boot:run &
      
      - name: Start Frontend
        working-directory: mediqueue-frontend
        run: npm install && npm run dev &
      
      - name: Wait for servers
        run: sleep 25

      - name: Run Cypress Tests
        working-directory: mediqueue-frontend
        run: npx cypress run